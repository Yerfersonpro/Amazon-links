<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Recomendados de Amazon</title>
<style>

/* ====================================================================
   ZONA DE DISEÑO — cambia colores, fuentes y tamaños aquí.
   No necesitas tocar nada más abajo para cambiar el look de la página.
   ==================================================================== */
:root {
  --fondo-1: #0f2027;
  --fondo-2: #203a43;
  --fondo-3: #2c5364;
  --acento: #ff9900;       /* color Amazon, úsalo para botones/hover */
  --acento-hover: #e68a00;
  --texto-oscuro: #1a1a1a;
  --tarjeta-fondo: #ffffff;
  --radio-borde: 14px;
  --fuente: 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; }

body {
  font-family: var(--fuente);
  background: linear-gradient(135deg, var(--fondo-1) 0%, var(--fondo-2) 50%, var(--fondo-3) 100%);
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  color: white;
}

.container {
  width: 100%;
  max-width: 480px;
  padding: 30px 15px 50px;
}

.perfil { text-align: center; margin-bottom: 25px; }

.profile-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 3px solid var(--acento);
  object-fit: cover;
}

h1 { font-size: 1.4rem; margin: 10px 0 5px 0; }
.subtitle { font-size: 0.9rem; opacity: 0.8; margin: 0; }

/* Pestañas de categorías */
.tabs-container {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 25px 0;
  flex-wrap: wrap;
}

.tab-button {
  background-color: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.85rem;
  transition: all 0.25s ease;
}

.tab-button.active {
  background-color: white;
  color: var(--texto-oscuro);
  border-color: white;
  box-shadow: 0 4px 12px rgba(255,255,255,0.2);
}

.links-content {
  display: none;
  flex-direction: column;
  gap: 12px;
  animation: fadeIn 0.35s ease;
}

.links-content.active { display: flex; }

/* Tarjeta de producto: imagen + texto + flecha */
.link-card {
  background-color: var(--tarjeta-fondo);
  color: var(--texto-oscuro);
  text-decoration: none;
  padding: 10px 16px;
  border-radius: var(--radio-borde);
  font-size: 0.95rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
}

.link-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(255, 153, 0, 0.3);
}

.link-card img.producto-img {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 10px;
  flex-shrink: 0;
  background: #f0f0f0;
}

.link-card .titulo {
  flex: 1;
  line-height: 1.3;
}

.link-card .flecha {
  color: var(--acento);
  font-size: 0.9rem;
  flex-shrink: 0;
}

footer { margin-top: 40px; font-size: 0.75rem; opacity: 0.5; text-align: center; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="container">
  <div class="perfil">
    <img class="profile-img" id="profile-img" src="" alt="Foto de perfil">
    <h1 id="profile-name"></h1>
    <p class="subtitle">📦 Presiona una categoría para ver mis recomendaciones</p>
  </div>

  <div class="tabs-container" id="tabs-container"></div>
  <div id="links-container"></div>

  <footer>© 2026 | Mis Enlaces de Afiliado</footer>
</div>

<script>
/* ====================================================================
   ZONA DE CONTENIDO — esto es lo único que necesitas editar día a día.

   1) Cambia tu foto y usuario en PERFIL.
   2) Para añadir una categoría nueva: copia un bloque { nombre, emoji,
      productos: [...] } dentro de CATEGORIAS.
   3) Para añadir un producto: copia una línea { titulo, link, imagen }
      dentro de la categoría que quieras. Borra "imagen" o déjala como
      cadena vacía "" si no tienes imagen — se mostrará un cuadro gris.
   ==================================================================== */

const PERFIL = {
  nombre: "Yeferson y sus Gustos",
  foto: "https://a.co/d/07CsAZGj"
};

const CATEGORIAS = [
  {
    nombre: "Tecnología",
    emoji: "💻",
    productos: [
      { titulo: "Cámara Osmo Pocket 3", link: "https://amzn.to/49ZAPYg", imagen: "" },
      { titulo: "Micrófonos Hollyland LARK M2 Bluetooth Inalámbricos con Cancelación de Ruido", link: "https://amzn.to/4vG8eiU", imagen: "" },
      { titulo: "Soporte Ajustable para Celular Statik HyperMount", link: "https://amzn.to/4vPOOZ7", imagen: "" },
      { titulo: "Automatic Selfie Stick Tripod with Remote", link: "https://amzn.to/43wF222", imagen: "" },
      { titulo: "Samsung Galaxy Watch8 Smartwatch, 44mm", link: "https://amzn.to/4a3OUE2", imagen: "" }
    ]
  },
  {
    nombre: "Día del Padre",
    emoji: "🏠",
    productos: [
      { titulo: "Metal Detector for Adults Professional", link: "https://amzn.to/4uWZsN3", imagen: "" },
      { titulo: "Our First Father's Day Dad and Baby Matching Outfits", link: "https://amzn.to/3S5VKTv", imagen: "" },
      { titulo: "Smart Watch for Men Women with Bluetooth", link: "https://amzn.to/3S9VEdw", imagen: "" },
      { titulo: "12 in 1 Hammer Multitool Gifts for Men", link: "https://amzn.to/4ey6gdQ", imagen: "" },
      { titulo: "Ultra-Light Injection Molded Cooler", link: "https://amzn.to/43Dy8Ih", imagen: "" }
    ]
  },
  {
    nombre: "Camping equipment",
    emoji: "🏕",
    productos: [
      { titulo: "Camping Equipment", link: "https://www.amazon.ca/shop/yefer40/list/2UIJVOP3FPJ79?ref_=aipsflist", imagen: "" },
      
    ]
  }
];

/* ====================================================================
   MOTOR DE LA PÁGINA — no hace falta tocar esto.
   Lee PERFIL y CATEGORIAS de arriba y construye la página automáticamente.
   ==================================================================== */

document.getElementById("profile-img").src = PERFIL.foto;
document.getElementById("profile-name").textContent = PERFIL.nombre;

const tabsContainer = document.getElementById("tabs-container");
const linksContainer = document.getElementById("links-container");

CATEGORIAS.forEach((categoria, index) => {
  const slug = "cat-" + index;

  // Botón de pestaña
  const btn = document.createElement("button");
  btn.className = "tab-button" + (index === 0 ? " active" : "");
  btn.textContent = `${categoria.emoji} ${categoria.nombre}`;
  btn.addEventListener("click", () => openCategory(slug, btn));
  tabsContainer.appendChild(btn);

  // Panel de productos
  const panel = document.createElement("div");
  panel.id = slug;
  panel.className = "links-content" + (index === 0 ? " active" : "");

  categoria.productos.forEach(producto => {
    const card = document.createElement("a");
    card.href = producto.link;
    card.target = "_blank";
    card.rel = "noopener";
    card.className = "link-card";

    const img = document.createElement("img");
    img.className = "producto-img";
    img.src = producto.imagen || "https://placehold.co/100x100/eeeeee/aaaaaa?text=%20";
    img.alt = producto.titulo;
    img.loading = "lazy";
    img.onerror = () => { img.src = "https://placehold.co/100x100/eeeeee/aaaaaa?text=%20"; };

    const titulo = document.createElement("span");
    titulo.className = "titulo";
    titulo.textContent = producto.titulo;

    const flecha = document.createElement("span");
    flecha.className = "flecha";
    flecha.textContent = "➔";

    card.appendChild(img);
    card.appendChild(titulo);
    card.appendChild(flecha);
    panel.appendChild(card);
  });

  linksContainer.appendChild(panel);
});

function openCategory(slug, btnEl) {
  document.querySelectorAll(".links-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-button").forEach(el => el.classList.remove("active"));
  document.getElementById(slug).classList.add("active");
  btnEl.classList.add("active");
}
</script>

</body>
</html>
